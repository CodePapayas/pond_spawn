name: Coverage

on: [push, pull_request]

jobs:
  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest --cov=controllers --cov=simulation --cov-report=term-missing --cov-report=xml

      - name: Generate coverage badge
        if: github.ref == 'refs/heads/main'
        run: |
          python scripts/generate_coverage_badge.py coverage.xml coverage.svg

      - name: Push coverage badge
        if: github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git fetch origin badges:badges
          git checkout badges
          mkdir -p badges
          mv coverage.svg badges/
          git add badges/coverage.svg
          git commit -m "Update coverage badge" || echo "No changes to commit"
          git push origin badges
