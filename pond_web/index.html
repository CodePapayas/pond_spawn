<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pond_spawn</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
canvas { display: block; }

#hud {
  position: fixed;
  top: 16px; left: 16px;
  color: rgba(60, 220, 180, 0.75);
  font-size: 12px;
  line-height: 1.7;
  text-shadow: 0 0 10px rgba(0, 255, 180, 0.4);
  pointer-events: none;
}

#hint {
  position: fixed;
  bottom: 16px; left: 16px;
  color: rgba(80, 120, 180, 0.45);
  font-size: 11px;
  line-height: 1.8;
  pointer-events: none;
}

#paused-banner {
  display: none;
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  color: rgba(60, 220, 180, 0.5);
  font-size: 24px;
  letter-spacing: 8px;
  text-transform: uppercase;
  text-shadow: 0 0 20px rgba(0, 255, 180, 0.6);
  pointer-events: none;
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <div id="h-step">step —</div>
  <div id="h-agents">agents —</div>
  <div id="h-energy">avg energy —</div>
  <div id="h-food">food —</div>
  <div id="h-speed">speed ×1</div>
</div>

<div id="hint">
  drag → stir &nbsp;·&nbsp; dblclick → pour agents<br>
  space → pause &nbsp;·&nbsp; +/- → speed
</div>

<div id="paused-banner">paused</div>

<script type="module" src="renderer.js"></script>
</body>
</html>
